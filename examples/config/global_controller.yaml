# Global Controller Configuration
# Lists all agents/controllers that the global controller manages.

agents:
  - name: FinanceAgent
    host: localhost
    port: 8051
    redis_port: 6379   # Redis port on this node
    # user: sagarwal  # SSH user for remote hosts (omit for localhost)
    # Number of instances to launch
    replicas: 1
    # Resource limits per instance
    resources:
      cpu: 1          # Number of CPU cores
      memory: 512     # Memory in MB
    # Path to the agent entrypoint script
    entrypoint: agents/finance_agent.py

  - name: MarketResearchAgent
    host: localhost
    port: 8052
    redis_port: 6379
    # user: sagarwal
    replicas: 1
    resources:
      cpu: 1
      memory: 512
    entrypoint: agents/market_agent.py

  - name: VllmAgent
    host: localhost
    port: 8053
    redis_port: 6379
    replicas: 1
    resources:
      cpu: 2
      memory: 2048
    entrypoint: agents/vllm_agent.py

  - name: Workflow
    host: localhost
    port: 8050             # LC gRPC port (exposed to host)
    type: workflow
    api_port: 8080         # Flask REST API port (exposed to host)
    redis_port: 6379
    replicas: 1
    workflow_file: workflows/example_workflow.py

# Polling interval in seconds
poll_interval: 5

# Redis connection
redis:
  host: localhost
  port: 6379
  db: 0
