agent:
  name: FinanceAgent
  functions:
    - name: get_stock_price
      description: Get the stock price for a given ticker.
      arguments:
        - name: ticker
          type: str
      returns:
        type: float

    - name: get_company_name
      description: Get the company name for a given ticker.
      arguments:
        - name: ticker
          type: str
      returns:
        type: str

    - name: run
      description: Run the finance agent with a query.
      arguments:
        - name: query
          type: str
      returns:
        type: str
