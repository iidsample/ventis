# Global Controller Configuration
# Lists all agents/controllers that the global controller manages.

agents:
  - name: FinanceAgent
    host: localhost
    port: 40051
    redis_port: 6379   # Redis port on this node
    # user: sagarwal  # SSH user for remote hosts (omit for localhost)
    # Number of instances to launch
    replicas: 1
    # Resource limits per instance
    resources:
      cpu: 1          # Number of CPU cores
      memory: 512     # Memory in MB
    # Path to the agent entrypoint script
    entrypoint: examples/finance_agent.py

  - name: MarketResearchAgent
    host: localhost
    port: 40052
    redis_port: 6379
    # user: sagarwal
    replicas: 1
    resources:
      cpu: 1
      memory: 512
    entrypoint: examples/market_agent.py

# Polling interval in seconds
poll_interval: 5

# Redis connection
redis:
  host: localhost
  port: 6379
  db: 0
